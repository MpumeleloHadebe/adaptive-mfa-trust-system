{% extends "base.html" %}
{% block content %}
<h2>Login</h2>
<form method="POST" class="form-box">
    {{ form.hidden_tag() }}

    <div class="form-group">
        {{ form.email.label }} 
        {{ form.email(class="input-field") }}
    </div>

    <div class="form-group">
        {{ form.password.label }} 
        {{ form.password(class="input-field") }}
    </div>

    {{ form.submit(class="btn-submit") }}
</form>
{% endblock %}
